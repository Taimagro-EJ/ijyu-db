name: Collect Lifestyle Data

on:
  # 毎週日曜 深夜2時（JST）= UTC土曜17:00
  schedule:
    - cron: '0 17 * * 6'
  # 手動実行
  workflow_dispatch:
    inputs:
      limit:
        description: '処理件数の上限（テスト用。空欄=全527件）'
        required: false
        default: ''
      resume:
        description: '中断再開モード（true/false）'
        required: false
        default: 'false'
      municipality:
        description: '特定市町村IDのみ処理（例: 20202）'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 170

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check current progress
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'EOF'
          import requests, os
          key = os.environ.get('SUPABASE_SERVICE_KEY','').strip().strip('"').strip("'")
          url = os.environ.get('SUPABASE_URL','').strip().strip('"').strip("'")
          r = requests.get(
            f"{url}/rest/v1/stats_lifestyle?select=municipality_id&overpass_collected_at=not.is.null",
            headers={"apikey": key, "Authorization": f"Bearer {key}", "Prefer": "count=exact"}
          )
          count = r.headers.get('Content-Range', '0/?').split('/')[0].split('-')[-1]
          print(f"現在の取得済み件数: {count} / 527")
          EOF

      - name: Run collect_lifestyle.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scripts
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.resume }}" = "true" ]; then
            ARGS="$ARGS --resume"
          fi
          if [ -n "${{ github.event.inputs.municipality }}" ]; then
            ARGS="$ARGS --municipality ${{ github.event.inputs.municipality }}"
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --resume"
          fi
          echo "実行コマンド: python3 collect_lifestyle.py $ARGS"
          python3 collect_lifestyle.py $ARGS || true

      - name: Check final progress
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'EOF'
          import requests, os
          key = os.environ.get('SUPABASE_SERVICE_KEY','').strip().strip('"').strip("'")
          url = os.environ.get('SUPABASE_URL','').strip().strip('"').strip("'")
          r = requests.get(
            f"{url}/rest/v1/stats_lifestyle?select=municipality_id&overpass_collected_at=not.is.null",
            headers={"apikey": key, "Authorization": f"Bearer {key}", "Prefer": "count=exact"}
          )
          count = int(r.headers.get('Content-Range', '0/?').split('/')[0].split('-')[-1] or 0)
          total = 527
          pct = round(count / total * 100, 1)
          print(f"完了件数: {count} / {total} ({pct}%)")
          if count >= total:
            print("全市町村のデータ収集完了！")
          elif count >= total * 0.9:
            print("90%以上完了。残りは次回の実行で完了予定。")
          else:
            print(f"{total - count}件が未取得。次回の実行で継続。")
          EOF

      - name: Upload progress file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collect-progress-${{ github.run_id }}
          path: scripts/collect_lifestyle_progress.json
          if-no-files-found: ignore
          retention-days: 30

  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 170
    if: github.event_name == 'schedule'
    needs: collect
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check if recovery needed
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'EOF'
          import requests, os
          key = os.environ.get('SUPABASE_SERVICE_KEY','').strip().strip('"').strip("'")
          url = os.environ.get('SUPABASE_URL','').strip().strip('"').strip("'")
          r = requests.get(
            f"{url}/rest/v1/stats_lifestyle?select=municipality_id&overpass_collected_at=not.is.null",
            headers={"apikey": key, "Authorization": f"Bearer {key}", "Prefer": "count=exact"}
          )
          count = int(r.headers.get('Content-Range', '0/?').split('/')[0].split('-')[-1] or 0)
          print(f"取得済み: {count} / 527")
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
            f.write(f"needed={'false' if count >= 527 else 'true'}\n")
          EOF

      - name: Run recovery collection
        if: steps.check.outputs.needed == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scripts
          echo "リカバリー実行: 未取得の市町村を継続収集"
          python3 collect_lifestyle.py --resume || true

      - name: Final status report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'EOF'
          import requests, os
          key = os.environ.get('SUPABASE_SERVICE_KEY','').strip().strip('"').strip("'")
          url = os.environ.get('SUPABASE_URL','').strip().strip('"').strip("'")
          r = requests.get(
            f"{url}/rest/v1/stats_lifestyle?select=municipality_id&overpass_collected_at=not.is.null",
            headers={"apikey": key, "Authorization": f"Bearer {key}", "Prefer": "count=exact"}
          )
          count = int(r.headers.get('Content-Range', '0/?').split('/')[0].split('-')[-1] or 0)
          print(f"最終結果: {count} / 527 ({round(count/527*100,1)}%)")
          EOF
